# barreler.yaml

# Formatting options
line_length: 80

# Global file filters
include:
  - "**/*.dart"
exclude:
  - "**/*.g.dart"
  - "**/*.freezed.dart"
  - "**/*.mocks.dart"

# Default settings for all directories
defaults:
  file_name: # defaults to directory name
  comments: # Optional copyright header
  disclaimer: GENERATED CODE - DO NOT MODIFY BY HAND

# Directory-specific configurations
dirs:
  - path: lib/presentation/screens
    name: # Optional: defaults to directory name ("lib")
    disclaimer: true
    comments: # Optional: directory-specific comments

  - path: lib/presentation/providers
    name: # Optional: defaults to directory name ("lib")
    disclaimer: true
    comments: # Optional: directory-specific comments

  - path: lib/presentation/widgets
    name: # Optional: defaults to directory name ("lib")
    disclaimer: true
    comments: # Optional: directory-specific comments

      